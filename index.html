        <li>
          <img src="assets/header.jpg">
          <figcaption>I am Flosha. I attempt to train myself externally and internally, seeing Acrobatics as my <em>Sadhana</em>, while writing about what I learn. I try to explain and to promote ideas, to develop an "anti-entertainment" game and search for ways to liberate myself from money.</figcaption>

          <a href="https://sarvodaya.eu">
            <img src="assets/sn.jpg">
          </a>
          <figcaption>In the <a href="https://sarvodaya.eu" target="_blank">Sarvodaya Network</a> I want to show how in the philosophy of Vinoba, in which I found my own, spiritual practice and revolutionary zeal can (and should always go) hand in hand. It is meant for everyone interested in spirituality and everyone interested in changing the world.</figcaption>

        <li>

          <figcaption>The <a href="" target="_blank">AcroLib</a> is a project, in which I collect
           all my thoughts and experiences in training acrobatics and collect open source ressources.
           It also contains an "International Glossary" of acrobatic terms, in which I explain acrobatic terminology, including words from different acrobatic cultures around the world.</figcaption>
        </li>
        <li>
          <a href="https://phoenixthegame.com" target="_blank">
            <img class="phnx" src="assets/phnx.jpg">
          </a>
          <figcaption>We describe <a href="https://phoenixthegame.com">Phoenix</a> as "a radically immersive action rpg that sucks less" and as a "gothic drama". Externally it is a video game based on the original vision for GOTHIC (2001) as it has been imagined in 1995 to 1999. It takes the form of a drama, clad in the robe of a particular gothic aesthetics. It can basically be seen as an interactive book, which a few friends and myself put all of our passion and philosophy into. It is a game that isn't meant to entertain, trying to transcend the medium.<br>
          <ul>
            <li><a href="https://phoenixthegame.com">phoenixthegame.com</a></li>
            <li><a href="https://docs.phoenixhthegame.com">phoenix concept docs</a></li>
          </ul></figcaption>
        </li>
        <li>
          <a href="coming.html">
            <!--<h3>notes/blog</h3>-->
            <img src="assets/entflechter.jpg">
          </a>
          <figcaption>The "Disentangler of Confusion" (original German name: "Entflechter der Wirrnis") was once my attempt to write a book in which I basically tried to disentangle all the confusion that I had about life. I started writing it when I was about 19. But I was never satisfied and it never ended, or in other words, I wasn't able to disentangle my confusion. In 2026 I re-envisioned it in form of an ongoing collection of reflections. It doesn't have to disentangle <em>all</em> the confusion, it is already worthwile when it disentangles a little of it and can serve others as it serves me. You may consider it as a blog, with an index that grows over time, in which the entries are updated whenever I change my mind or discover anything new; you may also see it as a book in progress, written in public. Coming soon.</figcaption>
        </li>
        <li>
          <a href="coming.html">
            <!--<h3>webdesign</h3>-->
            <img src="assets/phoenixtales.jpg">
          </a>
          <figcaption>I am designing websites since I am about 12 years old. Most of it I thaught myself and learned on behalf of Phoenix. The website here and all the websites that I link to on this personal page have been made by me. Here I show all of my websites that are currently online, describe how I make them and why, describe my webdesign philosophy and give you the opportunity to reach out if you want a website for yourself or your own project. Coming soon. <!-- My websites are completely made "by hand" from scratch, with pure HTML and CSS. I try to avoid scripts whenever possible. Simple, static websites is what I make and prefer. Most of the websites I have designed have been made for my own projects. But I also have made a few websites for others, such as Lewie West, SinY, my local acrobatics school or friends. I prefer to make websites for individuals. For craftsmen or artists or for social projects and teams that are doing something that I can support. I won't make a website for corporate clients that are abusing others for profit. If you want me to make a website for you, feel free to reach out. Then we'll see if it suits us. I prefer not to receive money and do not accept payment. I only accept alms.--></figcaption>
        </li>
        <li>
          <a href="https://gothicarchive.org">
            <img src="assets/archive.jpg">
          </a>
          <figcaption>The <a href="https://gothicarchive.org">Gothic Archive</a> is a subproject of Phoenix. It is a collection of pre-release material to the videogame GOTHIC that Phoenix is based on. We collected all of this material in course of many years on behalf of the development of Phoenix, which is inspired by all of these old and almost forgotten ideas for a game that has never been made in the way it has been envisioned and promoted. We decided to present it to the public in form of a website, so that others too can get an idea of what GOTHIC was once about.</figcaption>
        </li>
